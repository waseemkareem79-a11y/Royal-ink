<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Ink — النظام السحابي فائق السرعة والأداء</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');

:root {
  --ink-black: #0D0D0F; --ink-deep: #131318; --ink-panel: #1A1A22; --ink-card: #20202C;
  --ink-border: #2C2C3E; --ink-gold: #C9A84C; --ink-gold-lt: #E8C97A; --ink-gold-dk: #8B6F2E;
  --ink-silver: #9898B0; --ink-dim: #5A5A72; --ink-white: #F0EEF8;
  --accent-green: #3DDC84; --accent-red: #FF5252;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Cairo', sans-serif; background-color: var(--ink-black); color: var(--ink-white); min-height: 100vh; display: flex; flex-direction: column; }

#login-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--ink-black); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-box { background-color: var(--ink-panel); border: 1px solid var(--ink-border); padding: 35px 30px; border-radius: 16px; width: 100%; max-width: 420px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
.login-box h2 { text-align: center; margin-bottom: 8px; color: var(--ink-gold); font-weight: 900; font-size: 24px; }
.login-box p { text-align: center; color: var(--ink-silver); font-size: 12px; margin-bottom: 25px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 12px; color: var(--ink-silver); margin-bottom: 6px; font-weight: 600; }
.form-group input { width: 100%; background-color: var(--ink-deep); border: 1px solid var(--ink-border); padding: 12px 14px; border-radius: 8px; color: var(--ink-white); outline: none; font-family: inherit; font-size: 14px; }
.form-group input:focus { border-color: var(--ink-gold); }
.login-btn { width: 100%; background: linear-gradient(90deg, var(--ink-gold-dk), var(--ink-gold)); border: none; padding: 13px; border-radius: 8px; color: var(--ink-black); font-weight: 700; font-family: inherit; cursor: pointer; font-size: 14px; margin-top: 10px; }

#app-screen { display: none; }
aside { width: 280px; background-color: var(--ink-deep); border-left: 1px solid var(--ink-border); display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; right: 0; z-index: 100; }
.brand { padding: 25px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--ink-border); }
.brand .logo { width: 35px; height: 35px; background: linear-gradient(135deg, var(--ink-gold), var(--ink-gold-dk)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--ink-black); font-size: 18px; }
.brand h1 { font-size: 16px; font-weight: 700; }
nav { padding: 15px 10px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
nav button { background: none; border: none; color: var(--ink-silver); padding: 12px 16px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-family: inherit; font-size: 14px; font-weight: 600; text-align: right; width: 100%; }
nav button.active { background: linear-gradient(90deg, rgba(201,168,76,0.12), transparent); color: var(--ink-gold); border-right: 3px solid var(--ink-gold); }

.admin-action { display: none; }

.mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background-color: var(--ink-deep); border-top: 1px solid var(--ink-border); z-index: 200; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); align-items: center; justify-items: center; }
.mobile-nav button { background: none; border: none; color: var(--ink-silver); display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; width: 100%; height: 100%; justify-content: center; }
.mobile-nav button.active { color: var(--ink-gold); }

main { margin-right: 280px; flex: 1; padding: 30px; min-width: 0; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 15px; flex-wrap: wrap; }
.search-wrapper { position: relative; flex: 1; max-width: 500px; width: 100%; }
.search-wrapper input { width: 100%; background-color: var(--ink-panel); border: 1px solid var(--ink-border); padding: 14px 18px; border-radius: 10px; color: var(--ink-white); font-family: inherit; font-size: 14px; outline: none; }
.search-loader { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; border: 2px solid var(--ink-border); border-top-color: var(--ink-gold); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }

.view-section { display: none; }
.view-section.active { display: block; }

.labels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
.label-card { background-color: var(--ink-panel); border: 1px solid var(--ink-border); border-radius: 14px; padding: 20px; position: relative; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
.label-card:hover { transform: translateY(-2px); border-color: var(--ink-gold); }
.card-header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid rgba(44, 44, 62, 0.5); padding-bottom: 8px; }
.card-title { font-size: 18px; font-weight: 700; color: var(--ink-white); }
.card-code { font-size: 14px; font-weight: 700; color: var(--ink-gold); }
.detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
.detail-label { color: var(--ink-silver); font-weight: 600; }
.detail-value { color: var(--ink-white); font-weight: 700; text-align: left; }

.badge-line { display: inline-block; padding: 2px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; background-color: rgba(201,168,76,0.15); color: var(--ink-gold); }

.pagination-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 25px; padding: 10px; }
.page-btn { background-color: var(--ink-panel); border: 1px solid var(--ink-border); color: var(--ink-white); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 13px; transition: 0.2s; }
.page-btn:hover:not(:disabled) { border-color: var(--ink-gold); color: var(--ink-gold); }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.import-container { max-width: 550px; margin: 20px auto; }
.dropzone { border: 2px dashed var(--ink-border); background-color: var(--ink-panel); border-radius: 14px; padding: 50px 20px; text-align: center; cursor: pointer; position: relative; }
.loading-overlay-box { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(26,26,34,0.98); border-radius: 14px; flex-direction: column; align-items: center; justify-content: center; gap: 15px; z-index: 5; }
.spinner { width: 40px; height: 40px; border: 4px solid var(--ink-border); border-top-color: var(--ink-gold); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(5,5,8,0.85); backdrop-filter: blur(6px); z-index: 500; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-window { background-color: var(--ink-panel); border: 1px solid var(--ink-border); width: 90%; max-width: 500px; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
.modal-header { background-color: var(--ink-deep); padding: 18px 20px; border-bottom: 1px solid var(--ink-border); display: flex; justify-content: space-between; align-items: center; }

#toasts { position: fixed; bottom: 80px; left: 15px; right: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
.toast { background-color: var(--ink-panel); border: 1px solid var(--ink-border); padding: 14px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; }
.toast.success { border-right: 4px solid var(--accent-green); }
.toast.error { border-right: 4px solid var(--accent-red); }

@media (max-width: 768px) {
  aside { display: none; }
  .mobile-nav { display: grid; }
  main { margin-right: 0; padding: 15px; padding-bottom: 90px; }
  .labels-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>Royal Ink</h2>
    <p>النظام السحابي المتكامل فائق الأداء والسرعة</p>
    <div class="form-group">
      <label>الحساب الإلكتروني للمسؤول</label>
      <input type="email" id="loginEmail" placeholder="waseem.kareem79@gmail.com" autocomplete="off">
    </div>
    <div class="form-group">
      <label>رمز المرور</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="off">
    </div>
    <button class="login-btn" onclick="processLogin()">تسجيل الدخول الآمن</button>
  </div>
</div>

<div id="app-screen">
  <aside>
    <div class="brand"><div class="logo">R</div><div><h1>Royal Ink</h1><span id="role-badge" style="font-size:11px; color:var(--ink-gold)">التحقق...</span></div></div>
    <nav>
      <button onclick="switchView('labels')" id="btn-labels" class="active">📋 مستودع الليبلات</button>
      <button onclick="switchView('import')" id="btn-import" class="admin-action">📥 تحديث البيانات (إكسل)</button>
      <button onclick="performLogout()" style="color:var(--accent-red); margin-top:auto">🚪 خروج من النظام</button>
    </nav>
  </aside>

  <div class="mobile-nav">
    <button onclick="switchView('labels')" id="mbnt-labels" class="active">📋 الليبلات</button>
    <button onclick="switchView('import')" id="mbnt-import" class="admin-action">📥 رفع إكسل</button>
  </div>

  <main>
    <header>
      <div class="search-wrapper">
        <input type="text" id="mainSearch" placeholder="ابحث فوراً بجميع الحقول والتفاصيل..." oninput="triggerLiveSearch(this.value)">
        <div class="search-loader" id="searchLoader"></div>
      </div>
      <div id="connection-status" style="font-size:12px; color:var(--accent-green)">● محرك الأداء الفائق مستقر</div>
    </header>

    <section id="view-labels" class="view-section active">
      <div style="margin-bottom: 15px; font-size: 13px; color: var(--ink-silver);">
        إجمالي السجلات: <span id="total-count-badge" style="color: var(--ink-gold); font-weight: bold;">0</span> سجل | المعروض حالياً: <span id="view-range-badge" style="color: var(--accent-green);">0</span>
      </div>
      
      <div class="labels-grid" id="labels-cards-container"></div>

      <div class="pagination-controls" id="paginationWrapper">
        <button class="page-btn" id="prevPageBtn" onclick="changePage(-1)">السابق ➔</button>
        <span id="pageInfoText" style="font-size: 13px; font-weight: bold;">صفحة 1 من 1</span>
        <button class="page-btn" id="nextPageBtn" onclick="changePage(1)">⬅ التالي</button>
      </div>
    </section>

    <section id="view-import" class="view-section admin-action">
      <div class="import-container">
        <div class="dropzone">
          <div class="loading-overlay-box" id="loadingBox">
            <div class="spinner"></div>
            <p id="loadingText" style="color:var(--ink-gold); font-weight:700;">جاري تحليل وحفظ ملف التفاصيل بالكامل...</p>
          </div>
          <div onclick="document.getElementById('excelFileInput').click()">
            <span style="font-size:45px; display:block; margin-bottom:15px">📦☁️</span>
            <h3>تحديث سريع للملفات الضخمة</h3>
            <p>اضغط لاختيار ملف الإكسل لتجهيزه الفوري للعرض السريع</p>
            <input type="file" id="excelFileInput" style="display:none" accept=".xlsx, .xls, .xlsm" onchange="processFileDynamically(event)">
          </div>
        </div>
      </div>
    </section>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal-window" onclick="event.stopPropagation()">
    <div class="modal-header">
       <h3 id="modalTitleText" style="font-weight:700; color: var(--ink-white);"></h3>
       <button style="background:none; border:none; color:var(--ink-silver); font-size:20px; cursor:pointer" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBodyContent" style="padding:22px"></div>
  </div>
</div>

<div id="toasts"></div>

<script>
const PROJECT_BOX_ID = "royal_ink_full_details_v3";
let ALL_RECORDS = [];
let FILTERED_RECORDS = [];
let currentPage = 1;
const recordsPerPage = 20; 
let activeRole = "viewer";

window.onload = function() {
  const savedUser = sessionStorage.getItem("royal_user");
  if(savedUser) { setupUserSession(savedUser); }
};

function processLogin() {
  // تصفية المدخلات برمجياً لقطع أي مسافات زائدة كتبها المستخدم بالخطأ
  const email = document.getElementById("loginEmail").value.replace(/\s+/g, '').toLowerCase().trim();
  const pass = document.getElementById("loginPassword").value.replace(/\s+/g, '').trim();

  // الحساب المعتمد الخالي تماماً من المشاكل والمسافات
  if(email === "waseem.kareem79@gmail.com" && pass === "5420826") {
    setupUserSession("admin");
  } else if (email === "user@royalink.com" && pass === "User@2026") {
    setupUserSession("viewer");
  } else {
    showToast("بيانات الدخول غير صحيحة، يرجى التحقق من الأرقام", "error");
  }
}

function setupUserSession(role) {
  activeRole = role;
  sessionStorage.setItem("royal_user", role);
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-screen").style.display = "block";

  if(role === "admin") {
    document.getElementById("role-badge").innerText = "المدير العام (Admin)";
    document.querySelectorAll(".admin-action").forEach(el => {
      el.style.display = (el.id && el.id.startsWith("mbnt-")) ? "flex" : "block";
    });
  } else {
    document.getElementById("role-badge").innerText = "حساب مشاهد (Viewer)";
  }
  fetchLocalStoredData();
}

function performLogout() {
  sessionStorage.removeItem("royal_user");
  window.location.reload();
}

function fetchLocalStoredData() {
  const localData = localStorage.getItem(PROJECT_BOX_ID);
  if(localData) {
    ALL_RECORDS = JSON.parse(localData);
    FILTERED_RECORDS = [...ALL_RECORDS];
    currentPage = 1;
    updateInterface();
  } else {
    displayEmptyState("يرجى رفع ملف الإكسل لتنشيط النظام لأول مرة.");
  }
}

function processFileDynamically(event) {
  if(activeRole !== "admin") return showToast("هذه الصلاحية مخصصة للمدير فقط", "error");
  const file = event.target.files[0];
  if(!file) return;

  document.getElementById("loadingBox").style.display = "flex";
  const reader = new FileReader();
  
  reader.onload = async function(e) {
    try {
      const arrayBuffer = new Uint8Array(e.target.result);
      const workbook = XLSX.read(arrayBuffer, {type: "array"});
      const sheetName = workbook.SheetNames[0];
      const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {defval: ""});

      if(jsonData.length === 0) throw new Error("الملف فارغ");

      localStorage.setItem(PROJECT_BOX_ID, JSON.stringify(jsonData));
      
      setTimeout(() => {
        showToast("تم تحديث وحفظ كافة البيانات بنجاح فائق!", "success");
        ALL_RECORDS = jsonData;
        FILTERED_RECORDS = [...ALL_RECORDS];
        currentPage = 1;
        updateInterface();
        switchView("labels");
        document.getElementById("loadingBox").style.display = "none";
      }, 1000);

    } catch(err) {
      showToast("حدث خطأ أثناء قراءة الملف", "error");
      document.getElementById("loadingBox").style.display = "none";
    }
  };
  reader.readAsArrayBuffer(file);
}

let debounceTimer = null;
function triggerLiveSearch(value) {
  const loader = document.getElementById("searchLoader");
  loader.style.display = "block";
  clearTimeout(debounceTimer);

  debounceTimer = setTimeout(() => {
    const query = value.toLowerCase().trim();
    if(!query) {
      FILTERED_RECORDS = [...ALL_RECORDS];
    } else {
      FILTERED_RECORDS = ALL_RECORDS.filter(item => {
        return Object.values(item).some(val => String(val).toLowerCase().includes(query));
      });
    }
    currentPage = 1;
    updateInterface();
    loader.style.display = "none";
  }, 200);
}

function updateInterface() {
  document.getElementById("total-count-badge").innerText = ALL_RECORDS.length;
  renderPageCards();
}

function renderPageCards() {
  const container = document.getElementById("labels-cards-container");
  container.innerHTML = "";
  
  const totalRecords = FILTERED_RECORDS.length;
  const totalPages = Math.ceil(totalRecords / recordsPerPage) || 1;
  
  if(currentPage > totalPages) currentPage = totalPages;
  
  const startIndex = (currentPage - 1) * recordsPerPage;
  const endIndex = Math.min(startIndex + recordsPerPage, totalRecords);
  
  document.getElementById("view-range-badge").innerText = totalRecords > 0 ? `${startIndex + 1} إلى ${endIndex}` : "0";
  document.getElementById("pageInfoText").innerText = `صفحة ${currentPage} من ${totalPages}`;
  
  document.getElementById("prevPageBtn").disabled = (currentPage === 1);
  document.getElementById("nextPageBtn").disabled = (currentPage === totalPages);

  if(totalRecords === 0) {
    container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--ink-dim)">لا توجد نتائج مطابقة...</div>`;
    document.getElementById("paginationWrapper").style.display = "none";
    return;
  }
  
  document.getElementById("paginationWrapper").style.display = "flex";
  
  for (let i = startIndex; i < endIndex; i++) {
    const item = FILTERED_RECORDS[i];
    const keys = Object.keys(item);
    
    const labelCode = item["كود الليبل"] || item["رقم الكود"] || item["كود الـليبل"] || item[keys[0]] || "-";
    const labelName = item["اسم الليبل"] || item[keys[1]] || "-";
    const companyName = item["الشركة"] || item["اسم الشركة"] || item[keys[2]] || "-";
    const itemSize = item["العبوة"] || item["قياس العلبة"] || item[keys[3]] || "-";
    const productionLine = item["خط الإنتاج"] || item["خط الانتاج"] || item[keys[4]] || "LINE-1";
    
    let extraHTML = "";
    keys.forEach(k => {
      if(!["كود الليبل","رقم الكود","كود الـليبل","اسم الليبل","الشركة","اسم الشركة","العبوة","قياس العلبة","خط الإنتاج","خط الانتاج"].includes(k) && item[k]) {
        extraHTML += `<div class="detail-row"><span class="detail-label">${k}:</span><span class="detail-value">${item[k]}</span></div>`;
      }
    });

    container.innerHTML += `
      <div class="label-card" onclick="openDetailedModalGlobalIndex(${i})">
        <div class="card-header-info">
          <span class="card-title">${labelName}</span>
          <span class="card-code">${labelCode}</span>
        </div>
        <div class="detail-row"><span class="detail-label">الشركة:</span><span class="detail-value">${companyName}</span></div>
        <div class="detail-row"><span class="detail-label">العبوة:</span><span class="detail-value">${itemSize}</span></div>
        <div class="detail-row"><span class="detail-label">خط الإنتاج:</span><span class="badge-line">${productionLine}</span></div>
        ${extraHTML}
      </div>`;
  }
}

function changePage(direction) {
  currentPage += direction;
  renderPageCards();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openDetailedModalGlobalIndex(globalIndex) {
  const item = FILTERED_RECORDS[globalIndex];
  if(!item) return;
  
  const keys = Object.keys(item);
  document.getElementById("modalTitleText").innerText = item["اسم الليبل"] || "تفاصيل السجل";
  
  let modalBody = `<div style="line-height: 2.2; font-size: 14px;">`;
  keys.forEach(k => {
    let style = "";
    if(k.includes("كود") || k.includes("رقم")) style = `style="color: var(--ink-gold); font-weight: bold;"`;
    if(k.includes("عنوان") || k.includes("موقع") || k.includes("مخزن")) style = `style="color: var(--ink-gold-lt);"`;
    modalBody += `<p><b style="color: var(--ink-silver)">${k}:</b> <span ${style}>${item[k] || "-"}</span></p>`;
  });
  modalBody += `</div>`;
  
  document.getElementById("modalBodyContent").innerHTML = modalBody;
  document.getElementById("modalOverlay").classList.add("active");
}

function displayEmptyState(msg) { document.getElementById("labels-cards-container").innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--ink-dim)">${msg}</div>`; document.getElementById("paginationWrapper").style.display = "none"; }
function switchView(view) { document.querySelectorAll(".view-section").forEach(e => e.classList.remove("active")); document.querySelectorAll("nav button, .mobile-nav button").forEach(b => b.classList.remove("active")); document.getElementById(`view-${view}`).classList.add("active"); if(document.getElementById(`btn-${view}`)) document.getElementById(`btn-${view}`).classList.add("active"); if(document.getElementById(`mbnt-${view}`)) document.getElementById(`mbnt-${view}`).classList.add("active"); }
function closeModal() { document.getElementById("modalOverlay").classList.remove("active"); }
function showToast(msg,type="info"){ const el=document.createElement("div"); el.className=`toast ${type}`; el.innerHTML=`<span>${msg}</span>`; document.getElementById("toasts").appendChild(el); setTimeout(()=>el.remove(),3500); }
</script>
</body>
</html>
