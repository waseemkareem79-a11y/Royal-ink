<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Royal Ink Cloud — المستودع الرقمي الذكي</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');

:root {
  --ink-black: #0D0D0F; --ink-deep: #131318; --ink-panel: #1A1A22; --ink-card: #1E1E2A;
  --ink-border: #2C2C3E; --ink-gold: #C9A84C; --ink-gold-lt: #E8C97A; --ink-gold-dk: #8B6F2E;
  --ink-silver: #9898B0; --ink-dim: #5A5A72; --ink-white: #F0EEF8;
  --accent-green: #3DDC84; --accent-red: #FF5252;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Cairo', sans-serif; background-color: var(--ink-black); color: var(--ink-white); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

/* شريط البحث العلوي الذكي والمثبت */
.fixed-header { position: sticky; top: 0; background-color: rgba(13, 13, 15, 0.95); backdrop-filter: blur(10px); z-index: 90; padding: 15px; border-bottom: 1px solid var(--ink-border); display: flex; flex-direction: column; gap: 10px; }
.search-wrapper { position: relative; width: 100%; }
.search-wrapper input { width: 100%; background-color: var(--ink-panel); border: 1px solid var(--ink-border); padding: 14px 16px; border-radius: 10px; color: var(--ink-white); font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s; }
.search-wrapper input:focus { border-color: var(--ink-gold); }
.status-bar { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--ink-silver); padding: 0 5px; }

/* محتوى الواجهات */
main { flex: 1; padding: 15px; padding-bottom: 90px; width: 100%; max-width: 800px; margin: 0 auto; }
.view-section { display: none; }
.view-section.active { display: block; }

/* ترتيب شبكة كروت الليبلات المجمعة الذكية */
.labels-container { display: flex; flex-direction: column; gap: 14px; }
.label-card { background-color: var(--ink-card); border: 1px solid var(--ink-border); border-radius: 12px; padding: 16px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; border-bottom: 1px solid rgba(44, 44, 62, 0.4); padding-bottom: 8px; }
.card-title { font-size: 16px; font-weight: 700; color: var(--ink-gold-lt); max-width: 70%; word-break: break-word; }
.card-badge-code { font-size: 12px; font-weight: 700; color: var(--ink-gold); background: rgba(201,168,76,0.1); padding: 3px 8px; border-radius: 6px; border: 1px solid rgba(201,168,76,0.2); }

.grid-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.detail-item { display: flex; flex-direction: column; gap: 2px; }
.detail-lbl { font-size: 11px; color: var(--ink-silver); }
.detail-val { font-size: 13px; font-weight: 600; color: var(--ink-white); }

/* زر استعراض خلطات الألوان التابعة داخل الكرت */
.action-trigger-btn { width: 100%; background-color: var(--ink-panel); border: 1px solid var(--ink-border); color: var(--ink-white); padding: 11px; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; }
.action-trigger-btn:active { background-color: var(--ink-deep); }

/* نافذة عرض الألوان والخلطات المنبثقة السفلى للهواتف */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(5,5,8,0.8); backdrop-filter: blur(4px); z-index: 500; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-window { background-color: var(--ink-panel); border-top: 2px solid var(--ink-gold); width: 100%; max-width: 500px; border-radius: 16px 16px 0 0; overflow: hidden; display: flex; flex-direction: column; max-height: 85vh; transform: translateY(100%); transition: transform 0.25s ease-out; }
.modal-overlay.active .modal-window { transform: translateY(0); }
.modal-header { background-color: var(--ink-deep); padding: 16px; border-bottom: 1px solid var(--ink-border); display: flex; justify-content: space-between; align-items: center; }
.modal-body { padding: 16px; overflow-y: auto; flex: 1; }

.color-row-item { background: var(--ink-deep); border: 1px solid var(--ink-border); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
.color-name-hdr { font-size: 14px; font-weight: 700; color: var(--ink-white); margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
.formula-text-block { background: var(--ink-black); padding: 10px; border-radius: 6px; font-size: 12px; color: var(--ink-gold-lt); line-height: 1.6; border-right: 3px solid var(--ink-gold); white-space: pre-wrap; }

/* التبويبات السفلية للتحرك المباشر الحر المريح */
.bottom-nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background-color: var(--ink-deep); border-top: 1px solid var(--ink-border); z-index: 100; display: grid; grid-template-columns: 1fr 1fr; align-items: center; justify-items: center; }
.bottom-nav-bar button { background: none; border: none; color: var(--ink-silver); display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; width: 100%; height: 100%; justify-content: center; }
.bottom-nav-bar button.active { color: var(--ink-gold); }

/* أدوات الرفع والمزامنة الاحتياطية */
.dropzone-area { border: 2px dashed var(--ink-border); background-color: var(--ink-panel); border-radius: 12px; padding: 50px 15px; text-align: center; cursor: pointer; margin-top: 20px; }

/* الإشعارات السريعة التلقائية */
#toast-container { position: fixed; top: 20px; left: 20px; right: 20px; z-index: 1100; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast-msg { background-color: var(--ink-panel); border: 1px solid var(--ink-border); padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.4); animation: fadeIn 0.3s; }
.toast-msg.success { border-right: 4px solid var(--accent-green); color: var(--accent-green); }
.toast-msg.error { border-right: 4px solid var(--accent-red); color: var(--accent-red); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* أزرار التصفح والصفحات */
.pagination-container { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; padding: 5px 0; }
.nav-page-btn { background-color: var(--ink-panel); border: 1px solid var(--ink-border); color: var(--ink-white); padding: 8px 18px; border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: 600; }
.nav-page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>

<div id="app-screen" style="display: flex; flex-direction: column; width: 100%;">
  
  <div class="fixed-header">
    <div class="search-wrapper">
      <input type="text" id="mobileSearchInput" placeholder="ابحث باسم الليبل، الشركة، الكود، أو درجة اللون..." oninput="runLiveFilter(this.value)">
    </div>
    <div class="status-bar">
      <div>المستودع الذكي: <span id="records-counter" style="color:var(--ink-gold); font-weight:700">0</span> سجل مجمع</div>
      <div style="color:var(--accent-green)">● تحديث مباشر وتلقائي</div>
    </div>
  </div>

  <main>
    <section id="sec-labels" class="view-section active">
      <div class="labels-container" id="labels-render-target"></div>
      
      <div class="pagination-container" id="paginationController">
        <button class="nav-page-btn" id="btnPrev" onclick="navigatePage(-1)">السابق</button>
        <span id="txtPageInfo" style="font-size:12px; font-weight: 600;">صفحة 1 من 1</span>
        <button class="nav-page-btn" id="btnNext" onclick="navigatePage(1)">التالي</button>
      </div>
    </section>

    <section id="sec-import" class="view-section">
      <div class="dropzone-area" onclick="document.getElementById('hiddenFileInput').click()">
        <span style="font-size:45px; display:block; margin-bottom:12px">📥</span>
        <h3>تحديث قاعدة البيانات السحابية</h3>
        <p style="font-size:13px; color:var(--ink-silver); margin-top:5px">يمكنك اختيار ملف الإكسل المحدث في أي وقت لإعادة بنائه فوراً</p>
        <input type="file" id="hiddenFileInput" style="display:none" accept="*" onchange="readExcelFileCleanly(event)">
      </div>
    </section>
  </main>

  <div class="bottom-nav-bar">
    <button onclick="changeActiveTab('labels')" id="tab-labels" class="active">📋 تصفح المستودع</button>
    <button onclick="changeActiveTab('import')" id="tab-import">📤 رفع وتحديث قاعدة البيانات</button>
  </div>
</div>

<div class="modal-overlay" id="globalModalOverlay" onclick="closeGlobalModal()">
  <div class="modal-window" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalHeaderTitle" style="font-size:15px; color:var(--ink-white)">الألوان والتركيبات المعتمدة</h3>
      <button style="background:none; border:none; color:var(--ink-silver); font-size:18px; cursor:pointer" onclick="closeGlobalModal()">✕</button>
    </div>
    <div class="modal-body" id="modalViewBody"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
const DB_MASTER_KEY = "royal_ink_clean_db";

let SYSTEM_RECORDS = [];
let COMPILED_LABELS = [];
let DISPLAY_LABELS = [];
let pageIndex = 1;
const itemsPerPage = 12;

window.onload = function() {
  fetchStoredDatabase();
};

function fetchStoredDatabase() {
  const localData = localStorage.getItem(DB_MASTER_KEY);
  if (localData) {
    SYSTEM_RECORDS = JSON.parse(localData);
    processAndCleanRecords();
  } else {
    showPlaceholderState("مرحباً بك! يرجى الانتقال إلى قسم (رفع وتحديث قاعدة البيانات) واختيار ملف الإكسل لمرة واحدة، ليقوم التطبيق بحفظه وتثبيته في هاتفك للأبد وبشكل مباشر.");
  }
}

// 🧠 المحرك الهندسي لتجميع وفرز الـ 58 عموداً أفقياً في ملف رويال إنك
function processAndCleanRecords() {
  const aggregationMap = new Map();
  const ignoredKeywords = ["اسم الليبل", "الليبل", "label name", "اسم الشركة", "الشركة", "company", "رقم الكود", "كود", "code", "EMPTY__"];

  SYSTEM_RECORDS.forEach(row => {
    let label = (row["اسم الليبل"] || row["الليبل"] || "").toString().trim();
    let company = (row["اسم الشركة"] || row["الشركة"] || "عام").toString().trim();
    let codeNum = (row["رقم الكود"] || row["كود الليبل"] || "-").toString().trim();
    let size = (row["قياس العلبة"] || row["العبوة"] || "-").toString().trim();
    let lineName = (row["اسم الخط"] || row["خط الإنتاج"] || "-").toString().trim();
    let shelfNum = (row["رقم الرف"] || "-").toString().trim();
    let plateType = (row["نوع البليت"] || "-").toString().trim();

    if (!label || ignoredKeywords.some(kw => label.toLowerCase() === kw.toLowerCase()) || label.includes("EMPTY__")) return;

    // توليد المعرف الموحد للكرت المجمع
    const uniqueIdentityKey = `${label}_${codeNum}_${company}`.toLowerCase();

    if (!aggregationMap.has(uniqueIdentityKey)) {
      aggregationMap.set(uniqueIdentityKey, {
        labelName: label,
        companyName: company,
        itemCode: codeNum,
        packageSize: size,
        productionLine: lineName,
        shelfLocation: shelfNum,
        plateKind: plateType,
        associatedColors: []
      });
    }

    const currentLabelObj = aggregationMap.get(uniqueIdentityKey);

    // 🕵️‍♂️ تفكيك مصفوفة الأعمدة الثمانية للألوان والنسب الممتدة أفقياً
    const colorIndices = ["الاول", "الثاني", "الثالث", "الرابع", "الخامس", "السادس", "السابع", "الثامن"];
    const colorNamesMapping = ["اسم اللون الأول", "اسم اللون الثاني", "اسم اللون الثالث", "اسم اللون الرابع", "اسم اللون الخامس", "اسم اللون السادس", "اسم اللون السابع", "اسم اللون الثامن"];
    
    colorIndices.forEach((numText, index) => {
      let colorKey = `اللون ${numText}`;
      let ratioKey = `نسبة اللون ${numText}`;
      let qtyKey = `الکمية المطلوبة للون ${numText}` || `الكمية المطلوبة للون ${numText}`;
      let noteKey = `ملاحظات اللون ${numText}`;
      let customNameKey = colorNamesMapping[index];

      let colorVal = (row[colorKey] || "").toString().trim();
      let ratioVal = (row[ratioKey] || "").toString().trim();
      let qtyVal = (row[qtyKey] || row[`الكمية المطلوبة للون ${numText}`] || "").toString().trim();
      let noteVal = (row[noteKey] || row[`ملاحظات اللون ${numText}`] || row[`ملاحظات اللون السايع`] || "").toString().trim();
      let descName = (row[customNameKey] || "").toString().trim();

      if (colorVal && !colorVal.includes("EMPTY__") && !ignoredKeywords.some(kw => colorVal === kw)) {
        if (!currentLabelObj.associatedColors.some(c => c.code === colorVal)) {
          currentLabelObj.associatedColors.push({
            code: colorVal,
            name: descName || `درجة ${numText}`,
            ratio: ratioVal ? `${ratioVal}%` : "غير محددة",
            quantity: qtyVal ? `${qtyVal} KG` : "-",
            notes: noteVal && !noteVal.includes("EMPTY__") ? noteVal : "لا توجد"
          });
        }
      }
    });
  });

  COMPILED_LABELS = Array.from(aggregationMap.values());
  DISPLAY_LABELS = [...COMPILED_LABELS];
  pageIndex = 1;
  renderViewUiCards();
}

function renderViewUiCards() {
  const grid = document.getElementById("labels-render-target");
  grid.innerHTML = "";

  const totalItems = DISPLAY_LABELS.length;
  document.getElementById("records-counter").innerText = totalItems;

  const totalPagesCount = Math.ceil(totalItems / itemsPerPage) || 1;
  if (pageIndex > totalPagesCount) pageIndex = totalPagesCount;

  const startIndex = (pageIndex - 1) * itemsPerPage;
  const endIndex = Math.min(startIndex + itemsPerPage, totalItems);

  document.getElementById("txtPageInfo").innerText = `صفحة ${pageIndex} من ${totalPagesCount}`;
  document.getElementById("btnPrev").disabled = (pageIndex === 1);
  document.getElementById("btnNext").disabled = (pageIndex === totalPagesCount);

  if (totalItems === 0) {
    grid.innerHTML = `<div style="text-align:center; padding:40px; color:var(--ink-dim); font-size:14px;">لا توجد نتائج مطابقة لبحثك الحالي...</div>`;
    return;
  }

  for (let i = startIndex; i < endIndex; i++) {
    const dataObj = DISPLAY_LABELS[i];
    grid.innerHTML += `
      <div class="label-card">
        <div class="card-top">
          <span class="card-title">${dataObj.labelName}</span>
          <span class="card-badge-code">كود: ${dataObj.itemCode}</span>
        </div>
        <div class="grid-details">
          <div class="detail-item"><span class="detail-lbl">الشركة:</span><span class="detail-val">${dataObj.companyName}</span></div>
          <div class="detail-item"><span class="detail-lbl">العبوة:</span><span class="detail-val">${dataObj.packageSize}</span></div>
          <div class="detail-item"><span class="detail-lbl">اسم الخط:</span><span class="detail-val" style="color:var(--accent-green)">${dataObj.productionLine}</span></div>
          <div class="detail-item"><span class="detail-lbl">رقم الرف / البليت:</span><span class="detail-val" style="color:var(--ink-gold-lt)">الرف ${dataObj.shelfLocation} (${dataObj.plateKind})</span></div>
        </div>
        <button class="action-trigger-btn" onclick="showColorsModalPanel(${i})">
          🎨 كشف درجات الألوان والتركيبات (${dataObj.associatedColors.length})
        </button>
      </div>`;
  }
}

function showColorsModalPanel(index) {
  const currentObj = DISPLAY_LABELS[index];
  if (!currentObj) return;

  document.getElementById("modalHeaderTitle").innerText = `تفاصيل ألوان ليبل: ${currentObj.labelName}`;
  
  let modalHtml = "";
  if (currentObj.associatedColors.length === 0) {
    modalHtml = `<p style="text-align:center; color:var(--ink-dim); padding:20px; font-size:13px;">لم يتم ربط تفاصيل ألوان أو تركيبات لهذا السجل.</p>`;
  } else {
    currentObj.associatedColors.forEach(item => {
      modalHtml += `
        <div class="color-row-item">
          <div class="color-name-hdr">
            <span>🎨 كود الحبر: <b style="color:var(--ink-gold-lt)">${item.code}</b></span>
            <span style="font-size:11px; color:var(--ink-silver)">${item.name}</span>
          </div>
          <div class="formula-text-block">النسبة المعتمدة: ${item.ratio} | الكمية: ${item.quantity}\nالملاحظات المرفقة: ${item.notes}</div>
        </div>`;
    });
  }

  document.getElementById("modalViewBody").innerHTML = modalHtml;
  document.getElementById("globalModalOverlay").classList.add("active");
}

function runLiveFilter(searchVal) {
  const filterKey = searchVal.toLowerCase().trim();
  if (!filterKey) {
    DISPLAY_LABELS = [...COMPILED_LABELS];
  } else {
    DISPLAY_LABELS = COMPILED_LABELS.filter(item => {
      const mainMatch = item.labelName.toLowerCase().includes(filterKey) || 
                        item.itemCode.toLowerCase().includes(filterKey) || 
                        item.companyName.toLowerCase().includes(filterKey) || 
                        item.productionLine.toLowerCase().includes(filterKey);
                        
      const colorMatch = item.associatedColors.some(c => c.code.toLowerCase().includes(filterKey) || c.name.toLowerCase().includes(filterKey) || c.notes.toLowerCase().includes(filterKey));
      return mainMatch || colorMatch;
    });
  }
  pageIndex = 1;
  renderViewUiCards();
}

function readExcelFileCleanly(event) {
  const selectedFile = event.target.files[0];
  if (!selectedFile) return;

  pushToastNotification("جاري فك وقراءة ملف رويال إنك الضخم... يرجى الانتظار ثوانٍ", "success");

  const fileReader = new FileReader();
  fileReader.onload = function(e) {
    try {
      const bufferData = new Uint8Array(e.target.result);
      const parsedWorkbook = XLSX.read(bufferData, { type: 'array' });
      
      // استهداف ورقة السجلات المجمعة الرئيسية SHEET1
      const targetSheet = parsedWorkbook.SheetNames[0]; 
      const parsedJson = XLSX.utils.sheet_to_json(parsedWorkbook.Sheets[targetSheet], { defval: "" });

      if (parsedJson.length === 0) {
        pushToastNotification("الملف المرفوع فارغ تماماً!", "error");
        return;
      }

      localStorage.setItem(DB_MASTER_KEY, JSON.stringify(parsedJson));
      SYSTEM_RECORDS = parsedJson;
      processAndCleanRecords();
      pushToastNotification("تمت المزامنة وحفظ قاعدة البيانات بنجاح تام!", "success");
      changeActiveTab('labels');
    } catch (err) {
      pushToastNotification("حدث خطأ أثناء معالجة ملف الإكسل. تأكد من أنه ملف الشركة الأصلي.", "error");
    }
  };
  fileReader.readAsArrayBuffer(selectedFile);
}

function changeActiveTab(targetTab) {
  document.querySelectorAll(".view-section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".bottom-nav-bar button").forEach(b => b.classList.remove("active"));
  
  document.getElementById(`sec-${targetTab}`).classList.add("active");
  document.getElementById(`tab-${targetTab}`).classList.add("active");
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeGlobalModal() { document.getElementById("globalModalOverlay").classList.remove("active"); }
function navigatePage(direction) { pageIndex += direction; renderViewUiCards(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function showPlaceholderState(msg) { document.getElementById("labels-render-target").innerHTML = `<div style="text-align:center; padding:40px; color:var(--ink-silver); font-size:13px; line-height:1.8;">${msg}</div>`; document.getElementById("paginationController").style.display = "none"; }
function pushToastNotification(text, type = "success") { const t = document.createElement("div"); t.className = `toast-msg ${type}`; t.innerText = text; document.getElementById("toast-container").appendChild(t); setTimeout(() => t.remove(), 4000); }
</script>
</body>
</html>
